apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: evaluation-service
  labels:
    app: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
        - name: evaluation-service
          image: 634115191566.dkr.ecr.us-east-1.amazonaws.com/evaluation-service:latest
          ports:
            - containerPort: 8004
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
          env:
            - name: PORT
              value: "8004"
            - name: REDIS_URL
              value: "redis://<ELASTICACHE_ENDPOINT>:6379"
            - name: FLAG_SERVICE_URL
              value: "http://flag-service.flag-service.svc.cluster.local:8002"
            - name: TARGETING_SERVICE_URL
              value: "http://targeting-service.targeting-service.svc.cluster.local:8003"
            - name: SERVICE_API_KEY
              value: "<API_KEY>"
            - name: AWS_SQS_URL
              value: "https://sqs.us-east-1.amazonaws.com/<ACCOUNT_ID>/toggle-master-queue"
            - name: AWS_REGION
              value: "us-east-1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
